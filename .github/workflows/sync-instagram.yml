name: Sync 

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-reels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Instagram Fetch Script
        run: node scripts/fetch-instagram.js
        env:
          APIFY_TOKEN: ${{ secrets.INSTAVIDEO }}

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reels.json
          git diff --staged --quiet || git commit -m "chore: auto-sync instagram reels [skip ci]"
          git push
